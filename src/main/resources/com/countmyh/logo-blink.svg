<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="faceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#1a1d27"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer circle (clock body) -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Inner circle (clock face) -->
  <circle cx="256" cy="256" r="200" fill="url(#faceGrad)"/>

  <!-- Hour markers -->
  <rect x="250" y="72" width="12" height="30" rx="6" fill="#e4e4e7"/>
  <rect x="410" y="250" width="30" height="12" rx="6" fill="#e4e4e7"/>
  <rect x="250" y="410" width="12" height="30" rx="6" fill="#e4e4e7"/>
  <rect x="72" y="250" width="30" height="12" rx="6" fill="#e4e4e7"/>

  <!-- Small markers -->
  <rect x="330" y="88" width="8" height="20" rx="4" fill="#8b8d97" transform="rotate(30 334 98)"/>
  <rect x="394" y="156" width="8" height="20" rx="4" fill="#8b8d97" transform="rotate(60 398 166)"/>
  <rect x="394" y="336" width="8" height="20" rx="4" fill="#8b8d97" transform="rotate(120 398 346)"/>
  <rect x="330" y="400" width="8" height="20" rx="4" fill="#8b8d97" transform="rotate(150 334 410)"/>
  <rect x="170" y="400" width="8" height="20" rx="4" fill="#8b8d97" transform="rotate(210 174 410)"/>
  <rect x="106" y="336" width="8" height="20" rx="4" fill="#8b8d97" transform="rotate(240 110 346)"/>
  <rect x="106" y="156" width="8" height="20" rx="4" fill="#8b8d97" transform="rotate(300 110 166)"/>
  <rect x="170" y="88" width="8" height="20" rx="4" fill="#8b8d97" transform="rotate(330 174 98)"/>

  <!-- Clock hands — short, pointing up-right to avoid the face area -->
  <!-- Hour hand (pointing to ~12, short) -->
  <line x1="256" y1="220" x2="256" y2="130" stroke="#e4e4e7" stroke-width="10" stroke-linecap="round"/>
  <!-- Minute hand (pointing to ~3, short) -->
  <line x1="280" y1="220" x2="360" y2="220" stroke="#e4e4e7" stroke-width="6" stroke-linecap="round"/>

  <!-- Center dot (above the face) -->
  <circle cx="256" cy="220" r="10" fill="#6366f1"/>
  <circle cx="256" cy="220" r="5" fill="#e4e4e7"/>

  <!-- Smiling face — centered lower -->
  <!-- Left eye — happy curved eye (^) -->
  <path d="M 180 280 Q 195 280 210 280" stroke="#e4e4e7" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Right eye — happy curved eye (^) -->
  <path d="M 302 280 Q 317 280 332 280" stroke="#e4e4e7" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Big smile -->
  <path d="M 180 320 Q 218 380 256 380 Q 294 380 332 320"
        stroke="#e4e4e7" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- Rosy cheeks -->
  <circle cx="165" cy="330" r="18" fill="#ec4899" opacity="0.3"/>
  <circle cx="347" cy="330" r="18" fill="#ec4899" opacity="0.3"/>
</svg>
